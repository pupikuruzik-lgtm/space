<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Space — Обучение космосу</title>

<style>

body{
margin:0;
font-family:Arial;
background: radial-gradient(circle at bottom,#020111,#000);
color:white;
text-align:center;
}

.neon-big-text{
color:#00ff7f;
font-size:48px;
text-shadow:0 0 20px #fff,0 0 40px #fff;
}

.neon-text{
color:#00ff7f;
text-shadow:0 0 10px #fff;
}

.star{
position:absolute;
background:white;
border-radius:50%;
}

.planet{
position:absolute;
border-radius:50%;
}

#chatBox{
width:350px;
height:250px;
margin:auto;
border:2px solid #00ff7f;
padding:10px;
overflow-y:auto;
background:rgba(0,0,0,0.5);
}

#chatBox p{
background:rgba(0,0,0,0.6);
padding:6px;
border-radius:6px;
margin:5px 0;
}

.user{color:#00ff7f}
.bot{color:#00ffff}

input{
padding:6px;
width:220px;
}

button{
padding:6px 10px;
}

</style>
</head>

<body>

<h1 class="neon-big-text">🚀 Space</h1>
<p class="neon-text">Изучаем космос просто и интересно</p>

<h2 class="neon-big-text">🌍 Планеты</h2>
<p class="neon-text">Солнечная система состоит из 8 планет.</p>

<h2 class="neon-big-text">⭐ Звёзды</h2>
<p class="neon-text">Звезды — огромные шары газа.</p>

<h2 class="neon-big-text">👨‍🚀 Космонавты</h2>
<p class="neon-text">Космонавты исследуют космос.</p>

<h2 class="neon-big-text">💬 Чат с космическим помощником</h2>

<div id="chatBox"></div>

<br>

<input id="userInput" placeholder="Спроси что-нибудь о космосе">

<button onclick="sendMessage()">Отправить</button>

<script>

for(let i=0;i<80;i++){
let star=document.createElement("div")
star.className="star"
star.style.width=Math.random()*3+2+"px"
star.style.height=star.style.width
star.style.top=Math.random()*100+"%"
star.style.left=Math.random()*100+"%"
document.body.appendChild(star)
}

function sendMessage(){

let input=document.getElementById("userInput")
let chat=document.getElementById("chatBox")

let text=input.value.toLowerCase()

if(text==="")return

chat.innerHTML+=`<p class="user">Ты: ${text}</p>`

input.value=""

let answer="Я пока не знаю ответ 🤖"

if(text.includes("планет"))
answer="В Солнечной системе 8 планет: Меркурий, Венера, Земля, Марс, Юпитер, Сатурн, Уран и Нептун."

else if(text.includes("солнце"))
answer="Солнце — это звезда в центре нашей Солнечной системы."

else if(text.includes("луна"))
answer="Луна — это естественный спутник Земли."

else if(text.includes("галактик"))
answer="Наша галактика называется Млечный Путь."

else if(text.includes("привет"))
answer="Привет! Я космический помощник 🚀"

chat.innerHTML+=`<p class="bot">Бот: ${answer}</p>`

chat.scrollTop=chat.scrollHeight

}

document.getElementById("userInput").addEventListener("keypress",function(e){
if(e.key==="Enter")sendMessage()
})

</script>

</body>
</html>
